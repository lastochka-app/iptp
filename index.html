<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inblelt IPTP Browser & Player</title>
    <script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #e0e0e0; }
        
        #toolbar { 
            padding: 10px; 
            background: rgba(255, 255, 255, 0.5); 
            backdrop-filter: blur(10px); 
            border-bottom: 1px solid #ccc; 
            display: flex; 
            gap: 10px; 
            align-items: center;
        }
        
        #site-select { padding: 5px; flex-grow: 1; }
        #load-btn { padding: 5px 15px; cursor: pointer; }
        #status { font-size: 12px; color: #555; font-weight: bold; min-width: 250px; }
        
        #browser-frame { flex-grow: 1; border: none; width: 100%; background: #fff; }
        
        /* Экран Inblelt IPTP Player */
        #inblelt-player {
            display: none; /* Скрыт по умолчанию */
            flex-grow: 1;
            width: 100%;
            background: #000; /* Черный фон для мультимедиа */
            outline: none;
        }
    </style>
</head>
<body>

    <div id="toolbar">
        <select id="site-select">
            <option value="">Загрузка списка из Supabase...</option>
        </select>
        <button id="load-btn">Запустить</button>
        <div id="status">Готов</div>
    </div>

    <iframe id="browser-frame"></iframe>
    
    <video id="inblelt-player" controls autoplay></video>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const SUPABASE_URL = 'https://fjlfnecsltobwwdtukiq.supabase.co'
        const SUPABASE_KEY = 'sb_publishable_nrmtUJpMbA5pE46khRpwGA_4SzCYuDG'
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

        const client = new WebTorrent()
        const siteSelect = document.getElementById('site-select')
        const loadBtn = document.getElementById('load-btn')
        const statusDiv = document.getElementById('status')
        const browserFrame = document.getElementById('browser-frame')
        const videoElement = document.getElementById('inblelt-player')

        client.on('error', (err) => {
            console.error('Ошибка WebTorrent:', err)
            statusDiv.innerText = 'Ошибка: ' + err.message
        })

        // Класс управления потоковым плеером
        class InbleltIPTPPlayer {
            static playStream(file) {
                // Скрываем сайт, показываем плеер
                browserFrame.style.display = 'none'
                videoElement.style.display = 'block'
                
                // Рендерим поток байтов напрямую в видео-тег
                file.renderTo(videoElement, { autoplay: true })
            }

            static showBrowser() {
                // Скрываем и останавливаем плеер, возвращаем браузер
                videoElement.style.display = 'none'
                videoElement.pause()
                videoElement.removeAttribute('src')
                videoElement.load()
                browserFrame.style.display = 'block'
            }
        }

        async function loadSites() {
            const { data, error } = await supabase
                .from('p2p_sites')
                .select('*')
            
            if (error) {
                statusDiv.innerText = 'Ошибка подключения к БД'
                return
            }

            siteSelect.innerHTML = '<option value="">Выберите контент...</option>'
            data.forEach(site => {
                const option = document.createElement('option')
                option.value = site.magnet_uri
                option.textContent = site.title
                siteSelect.appendChild(option)
            })
        }

        loadBtn.addEventListener('click', () => {
            let magnetURI = siteSelect.value
            if (!magnetURI) return

            statusDiv.innerText = 'Поиск пиров...'
            browserFrame.src = 'about:blank'

            const wssTrackers = [
                'wss://tracker.btorrent.xyz',
                'wss://tracker.openwebtorrent.com'
            ]
            wssTrackers.forEach(tracker => {
                const encoded = encodeURIComponent(tracker)
                if (!magnetURI.includes(encoded)) {
                    magnetURI += `&tr=${encoded}`
                }
            })
            
            client.torrents.forEach(t => t.destroy())

            client.add(magnetURI, (torrent) => {
                torrent.on('download', () => {
                    const progress = (torrent.progress * 100).toFixed(1)
                    const speed = (torrent.downloadSpeed / 1024 / 1024).toFixed(2)
                    statusDiv.innerText = `Пиров: ${torrent.numPeers} | ${progress}% | ${speed} MB/s`
                })

                // Событие 'infoHash' или базовый коллбэк client.add срабатывает, 
                // когда получены метаданные (до скачивания самих файлов)
                const mediaFile = torrent.files.find(f => f.name.match(/\.(mp4|webm|mkv|mp3)$/i))
                const htmlFile = torrent.files.find(f => f.name.endsWith('.html'))

                if (mediaFile) {
                    // Мультимедиа найдено: стартуем Inblelt Player мгновенно
                    statusDiv.innerText = `IPTP Player: Буферизация ${mediaFile.name}...`
                    InbleltIPTPPlayer.playStream(mediaFile)
                } else if (htmlFile) {
                    // Сайт найден: переключаемся на браузер
                    InbleltIPTPPlayer.showBrowser()
                    
                    torrent.on('done', () => {
                        htmlFile.getBlobURL((err, url) => {
                            if (err) {
                                statusDiv.innerText = 'Ошибка рендеринга страницы'
                                return
                            }
                            browserFrame.src = url
                            statusDiv.innerText = `Готово! (Пиров: ${torrent.numPeers})`
                        })
                    })
                } else {
                    statusDiv.innerText = 'Ошибка: Поддерживаемый контент не найден в раздаче'
                }
            })
        })

        loadSites()
    </script>
</body>
</html>
