<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnet Web Browser</title>
    <script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #e0e0e0; }
        #toolbar { padding: 10px; background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(10px); border-bottom: 1px solid #ccc; display: flex; gap: 10px; align-items: center; }
        #site-select { padding: 5px; flex-grow: 1; height: 30px; }
        #load-btn { padding: 5px 15px; cursor: pointer; height: 30px; }
        #status { font-size: 12px; color: #333; font-weight: bold; min-width: 250px; }
        #browser-frame { flex-grow: 1; border: none; width: 100%; background: #fff; }
    </style>
</head>
<body>

    <div id="toolbar">
        <select id="site-select">
            <option value="">Синхронизация с Supabase...</option>
        </select>
        <button id="load-btn">Перейти</button>
        <div id="status">Инициализация...</div>
    </div>

    <iframe id="browser-frame"></iframe>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const SUPABASE_URL = 'https://fjlfnecsltobwwdtukiq.supabase.co'
        const SUPABASE_KEY = 'sb_publishable_nrmtUJpMbA5pE46khRpwGA_4SzCYuDG'
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

        const client = new WebTorrent()
        const siteSelect = document.getElementById('site-select')
        const loadBtn = document.getElementById('load-btn')
        const statusDiv = document.getElementById('status')
        const browserFrame = document.getElementById('browser-frame')

        let peerMonitorInterval = null

        client.on('error', (err) => {
            console.error('Критическая ошибка WebTorrent:', err)
            statusDiv.innerText = 'Ошибка сети: ' + err.message
        })

        // 1. Полноценная диагностика Supabase
        async function loadSites() {
            statusDiv.innerText = 'Подключение к базе данных...'
            try {
                const { data, error } = await supabase
                    .from('p2p_sites')
                    .select('*')
                
                if (error) {
                    console.error('Ошибка Supabase:', error)
                    statusDiv.innerText = `Ошибка БД: ${error.message} (Проверь RLS!)`
                    return
                }

                if (!data || data.length === 0) {
                    statusDiv.innerText = 'Сеть пуста. Добавьте Magnet-ссылки в таблицу p2p_sites.'
                    siteSelect.innerHTML = '<option value="">(Таблица p2p_sites пуста)</option>'
                    return
                }

                siteSelect.innerHTML = '<option value="">Выберите децентрализованный сайт...</option>'
                data.forEach(site => {
                    const option = document.createElement('option')
                    option.value = site.magnet_uri
                    option.textContent = site.title
                    siteSelect.appendChild(option)
                })
                statusDiv.innerText = 'Браузер готов. Выберите сайт.'
            } catch (err) {
                statusDiv.innerText = 'Критический сбой подключения: ' + err.message
            }
        }

        // 2. Стабильный запуск P2P загрузки
        loadBtn.addEventListener('click', () => {
            const magnetURI = siteSelect.value
            if (!magnetURI) return

            // Сброс предыдущего монитора пиров
            if (peerMonitorInterval) clearInterval(peerMonitorInterval)
            statusDiv.innerText = 'Подготовка окружения...'

            // Чистим память от старых торрентов
            client.torrents.forEach(t => {
                try { client.remove(t.infoHash) } catch(e) {}
            })

            try {
                // Передаем WebRTC трекеры через нативный объект опций (без перезаписи строки)
                const torrent = client.add(magnetURI, {
                    announce: [
                        'wss://tracker.btorrent.xyz',
                        'wss://tracker.openwebtorrent.com',
                        'wss://tracker.files.fm:7073/announce',
                        'wss://tracker.fastcast.nz'
                    ]
                })

                statusDiv.innerText = 'Вход в P2P сеть, поиск пиров...'

                // Мониторинг пиров в реальном времени (работает НАМНОГО раньше скачивания метаданных)
                peerMonitorInterval = setInterval(() => {
                    if (!torrent.metadata) {
                        statusDiv.innerText = `Поиск пиров для метаданных... (Активных пиров: ${torrent.numPeers})`
                    } else {
                        const progress = (torrent.progress * 100).toFixed(1)
                        const speed = (torrent.downloadSpeed / 1024).toFixed(1)
                        statusDiv.innerText = `Загрузка контента: ${progress}% | Пиров: ${torrent.numPeers} | ${speed} KB/s`
                    }
                }, 800)

                torrent.on('metadata', () => {
                    console.log('Метаданные получены, структура файлов ясна.')
                })

                torrent.on('done', () => {
                    clearInterval(peerMonitorInterval)
                    // Ищем любой файл, заканчивающийся на .html
                    const file = torrent.files.find(f => f.name.endsWith('.html'))

                    if (file) {
                        file.getBlobURL((err, url) => {
                            if (err) {
                                statusDiv.innerText = 'Ошибка компиляции Blob URL'
                                return
                            }
                            browserFrame.src = url
                            statusDiv.innerText = `Сайт успешно запущен! (Использовано пиров: ${torrent.numPeers})`
                        })
                    } else {
                        statusDiv.innerText = 'Ошибка: В торренте отсутствует стартовый .html файл'
                    }
                })

                torrent.on('error', (err) => {
                    clearInterval(peerMonitorInterval)
                    statusDiv.innerText = `Ошибка торрента: ${err.message}`
                })

            } catch (err) {
                statusDiv.innerText = 'Ошибка инициализации торрента: ' + err.message
            }
        })

        // Старт
        loadSites()
    </script>
</body>
</html>
